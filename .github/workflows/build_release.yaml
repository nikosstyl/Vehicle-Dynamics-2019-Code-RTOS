name: Build STM32 firmware

on:
  push:
    tags:
      - 'v*'   # runs on tag push like v1.0.0

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi cmake ninja-build

      # ---------------------------------------------
      # Function to build a firmware variant
      # ---------------------------------------------
      - name: Build firmware variants
        run: |
          TAG_NAME=${GITHUB_REF_NAME}
          VARIANTS=(
            "0x30 0x31 0x32 0x33"
            "0x34 0x35"
            "0x36 0x37"
          )
          mkdir -p release

          for IDS in "${VARIANTS[@]}"; do
            read CAN1_ID CAN2_ID CAN3_ID CAN4_ID <<< $IDS
            if [ -z "${CAN3_ID}" ]; then
              IS_COG=0
              BUILD_DIR=build_${CAN1_ID}_${CAN2_ID}
              echo "Building variant CANBUS_ID_1=$CAN1_ID CANBUS_ID_2=$CAN2_ID"
              NAME_METADATA="${CAN1_ID}-${CAN2_ID}"
            else
              IS_COG=1
              BUILD_DIR=build_${CAN1_ID}_${CAN2_ID}_${CAN3_ID}_${CAN4_ID}_COG
              echo "Building variant CANBUS_ID_1=$CAN1_ID CANBUS_ID_2=$CAN2_ID CANBUS_ID_3=$CAN3_ID CANBUS_ID_4=$CAN4_ID (COG)"
              NAME_METADATA="${CAN1_ID}-${CAN2_ID}-${CAN3_ID}-${CAN4_ID}-COG"
            fi
            

            # Configure
            cmake -B $BUILD_DIR \
              -DCMAKE_TOOLCHAIN_FILE=cmake/gcc-arm-none-eabi.cmake \
              -DCANBUS_ID_1=$CAN1_ID \
              -DCANBUS_ID_2=$CAN2_ID \
              -DCANBUS_ID_3=${CAN3_ID} \
              -DCANBUS_ID_4=${CAN4_ID} \
              -DIS_COG=$IS_COG \
              -G Ninja

            # Build
            cmake --build $BUILD_DIR --config Release

            # Find ELF
            ELF_FILE=$(find $BUILD_DIR -maxdepth 1 -type f -name "*.elf")
            ELF_FILE_NO_EXT="${ELF_FILE%.*}"
            NEW_ELF="release/$(basename $ELF_FILE_NO_EXT)-${NAME_METADATA}-$TAG_NAME-$(date +%s).elf"
            cp "$ELF_FILE" "$NEW_ELF"
            echo "Packaged ELF: $NEW_ELF"
          done

      # ---------------------------------------------
      # Create GitHub Release
      # ---------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
